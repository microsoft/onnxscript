name: Architecture Diff

on:
  pull_request:
    paths: ['src/mobius/**']
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base git ref to diff against"
        required: false
        default: "origin/main"
      head_ref:
        description: "Head git ref to diff"
        required: false
        default: "HEAD"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: arch-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  BASE_REF: ${{ github.event.pull_request.base.sha || github.event.inputs.base_ref || 'origin/main' }}
  HEAD_REF: ${{ github.event.pull_request.head.sha || github.event.inputs.head_ref || 'HEAD' }}

jobs:
  arch-diff:
    name: Architecture Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-arch-diff-${{ hashFiles('pyproject.toml') }}

      - name: Install PyTorch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: |
          pip install -r requirements/ci/requirements.txt
          pip install -e '.[testing]'

      - name: Run architecture diff
        run: |
          python scripts/arch_diff.py \
            --base-ref ${{ env.BASE_REF }} \
            --head-ref ${{ env.HEAD_REF }} \
            --output arch_diff.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('arch_diff.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = 'arch-diff-bot';
            const existing = comments.find(c => c.body.includes(marker));
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            };
            if (existing) {
              await github.rest.issues.updateComment({
                ...params, comment_id: existing.id,
              });
            } else {
              await github.rest.issues.createComment({
                ...params, issue_number: context.issue.number,
              });
            }

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: arch-diff-results
          path: arch_diff.md
