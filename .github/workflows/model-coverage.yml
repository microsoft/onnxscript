name: Model Coverage Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Model Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full history so git diff against origin/main works
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-coverage-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-coverage-

      - name: Install dependencies
        run: pip install -e '.[testing]'

      - name: Fetch base branch
        run: git fetch origin main

      - name: Check model coverage for new architectures
        run: |
          python scripts/check_new_model_coverage.py --diff-base origin/main
