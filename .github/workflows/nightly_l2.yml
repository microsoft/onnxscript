name: Nightly L2 Architecture Validation

on:
  schedule:
    # Run nightly at 3am UTC
    - cron: '0 3 * * *'
  push:
    tags:
      - 'l2-*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-l2
  cancel-in-progress: true

jobs:
  arch-validation:
    name: L2 Architecture Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-nightly-l2-${{ hashFiles('pyproject.toml', 'requirements/ci/requirements.txt') }}
          restore-keys: |
            pip-nightly-l2-

      - name: Cache HuggingFace configs
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-l2-configs-${{ hashFiles('tests/arch_validation_test.py') }}
          restore-keys: |
            hf-l2-configs-

      - name: Install PyTorch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements/ci/requirements.txt
          pip install -e '.[testing]'

      # Run sequentially (-p no:xdist) to stay under 2GB RAM
      - name: Run L2 architecture validation tests
        run: |
          pytest tests/arch_validation_test.py \
            -m arch_validation \
            -v \
            -p no:xdist \
            --timeout=300 \
            --junitxml=junit.xml \
            --tb=short
        timeout-minutes: 45

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: l2-arch-validation-results
          path: |
            junit.xml
          retention-days: 30
